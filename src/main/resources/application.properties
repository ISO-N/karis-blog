spring.application.name=karis-blog

# T16: 本地开发先接入内存版 H2，后续再逐步切到持久化实现
spring.datasource.url=jdbc:h2:mem:karis_blog;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# 当前还未进入实体建表阶段，先保持不自动生成表
spring.jpa.hibernate.ddl-auto=none
spring.jpa.open-in-view=false

# 打开 H2 控制台，便于本地查看内存数据库
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
